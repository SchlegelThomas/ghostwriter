e.”<\u002Fblockquote>\n            <\u002Farticle>\n            <article style=\"background:#fff;border:1px solid #ddd5ca;border-radius:7px;margin-top:8px;padding:9px\">\n              <strong style=\"font-size:11px\">Chapter 3 · Blackout<\u002Fstrong>\n              <blockquote style=\"border-left:2px solid #ddd5ca;color:#766c63;font-family:'Cormorant Garamond',Georgia,serif;margin:7px 0 0;padding-left:8px;font-size:11.5px;line-height:1.5\">“Calder asked about the logbook before she mentioned it existed.”<\u002Fblockquote>\n            <\u002Farticle>\n            <p style=\"color:#766c63;font-size:10.5px;margin:10px 0 6px\">+ 2 more passages<\u002Fp>\n            <div style=\"border-top:1px solid #ddd5ca;margin-top:8px;padding-top:11px;display:flex;flex-direction:column;gap:7px\">\n              <button type=\"button\" style=\"background:#2c2a27;border:1px solid #2c2a27;border-radius:6px;font-weight:700;padding:8px 10px;font-size:12px;color:#fff\">Confirm thread<\u002Fbutton>\n              <button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:8px 10px;font-size:12px;color:#28231f\">Edit &amp; confirm<\u002Fbutton>\n              <button type=\"button\" style=\"background:transparent;border:1px solid transparent;border-radius:6px;font-weight:700;padding:8px 10px;font-size:12px;color:#766c63\">Not a thread<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Faside>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:4px\">\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">The draft is read, never touched<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">The persistent banner and “Draft unchanged” save-state carry the 1.0 proposal-review guarantee to a much bigger operation.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Evidence per element<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">Each inferred beat, thread, or link carries its source passages. Rejecting one never “corrects” the manuscript.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Reject-all is honored<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">A writer can run the derivation out of curiosity and walk away. Nothing persists except a log entry in local history.<\u002Fp><\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ SCENE HANDOFF ============ -->\n  <section id=\"handoff\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <p style=\"color:#6e3f32;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">Journey B · Storyboard first<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 10px\">Canvas-to-scene handoff<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 8px;font-size:15px\">The Region tool lassoes a cluster — beats, an entity, a note, an image — and composes it downward into a scene brief. The writer edits the brief, then creates a real scene in Draft. Canvas objects stay where they are; the new scene links back to everything in the region.<\u002Fp>\n\n    <div style=\"border:1px solid #d8d0c5;border-radius:14px;margin:20px 0;overflow-x:auto;background:#fff\">\n      <div data-screen-label=\"Canvas-to-scene handoff\" role=\"img\" aria-label=\"Canvas to scene handoff concept\" style=\"width:1180px;background:#f5f1ea;color:#28231f;font-family:ui-sans-serif,system-ui,sans-serif;font-size:12px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;background:#fdfcf9;border-bottom:1px solid #ddd5ca;height:52px;padding:0 14px;gap:12px\">\n          <div style=\"display:flex;align-items:baseline;gap:6px\"><span style=\"font-family:'Parisienne',cursive;font-size:25px;line-height:.85;color:#2c2a27\">ghost-writer<\u002Fspan><\u002Fdiv>\n          <div style=\"color:#766c63;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">The Signal at Bellwether / Canvas / <strong style=\"color:#28231f\">New scene from region<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"color:#3f684f;font-size:11px;font-weight:700\">Saved locally<\u002Fspan><button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:7px 10px;font-size:12px;color:#28231f\">Search ⌘K<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:58px 1fr 320px;min-height:620px\">\n          <nav aria-label=\"Project areas\" style=\"background:#322c27;color:#cbbfb4;display:flex;flex-direction:column;gap:8px;padding:12px 7px;box-sizing:border-box\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">H<\u002Fb>Home<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">D<\u002Fb>Draft<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center;background:#4a4039;border:1px solid #5c5048;color:#fff\"><b style=\"font-size:12px\">C<\u002Fb>Canvas<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">S<\u002Fb>Story<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">R<\u002Fb>Review<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">I<\u002Fb>Inbox<\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">+<\u002Fb>Capture<\u002Fdiv>\n          <\u002Fnav>\n          <section style=\"position:relative;background:#f5f1ea;background-image:radial-gradient(#ddd3c4 1px,transparent 1px);background-size:22px 22px;overflow:hidden;min-width:0\">\n            <!-- dimmed non-region content -->\n            <article style=\"position:absolute;left:40px;top:70px;width:150px;background:#fff;border:1px solid #ddd5ca;border-radius:8px;padding:9px;opacity:.38\">\n              <span style=\"background:#e7f0e9;color:#3f684f;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Drafted<\u002Fspan>\n              <strong style=\"display:block;margin:5px 0 2px;font-size:12px\">Arrival at Bellwether<\u002Fstrong>\n              <p style=\"color:#766c63;margin:0;line-height:1.4;font-size:10.5px\">Mara takes the winter post.<\u002Fp>\n            <\u002Farticle>\n            <article style=\"position:absolute;left:60px;top:400px;width:130px;background:#f5ecd9;border:1px solid #e2d2ae;border-radius:6px;padding:8px;font-family:'Cormorant Garamond',Georgia,serif;font-size:11px;line-height:1.4;opacity:.38;transform:rotate(-1.6deg)\">The foghorn sounds five minutes before every call.<\u002Farticle>\n            <!-- lasso region -->\n            <div style=\"position:absolute;left:250px;top:80px;width:430px;height:420px;border:2px dashed #754535;border-radius:14px;background:rgba(117,69,53,.05)\"><\u002Fdiv>\n            <span style=\"position:absolute;left:266px;top:66px;background:#754535;color:#fff;font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;border-radius:999px;padding:3px 9px\">Region · 5 items selected<\u002Fspan>\n            <article style=\"position:absolute;left:280px;top:120px;width:158px;background:#fff;border:1px solid #ddd5ca;border-radius:8px;padding:9px;box-shadow:0 4px 10px rgba(50,44,39,.1)\">\n              <span style=\"background:#f5ecd9;color:#80622c;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Planned<\u002Fspan>\n              <strong style=\"display:block;margin:5px 0 2px;font-size:12px\">Low Harbor goes dark<\u002Fstrong>\n              <p style=\"color:#766c63;margin:0;line-height:1.4;font-size:10.5px\">The town blames the lighthouse while the call predicts a rescue.<\u002Fp>\n            <\u002Farticle>\n            <article style=\"position:absolute;left:470px;top:150px;width:158px;background:#fff;border:1px solid #ddd5ca;border-radius:8px;padding:9px;box-shadow:0 4px 10px rgba(50,44,39,.1)\">\n              <span style=\"background:#e8f0f4;color:#3f6175;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Confirmed beat<\u002Fspan>\n              <strong style=\"display:block;margin:5px 0 2px;font-size:12px\">The false rescue<\u002Fstrong>\n              <p style=\"color:#766c63;margin:0;line-height:1.4;font-size:10.5px\">Mara tests one prediction and succeeds — at a cost.<\u002Fp>\n            <\u002Farticle>\n            <div style=\"position:absolute;left:300px;top:290px;display:flex;flex-direction:column;align-items:center;gap:4px\">\n              <span style=\"width:42px;height:42px;border-radius:50%;background:#ded4ca;color:#754535;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;display:flex;align-items:center;justify-content:center;border:2px solid #3f684f\">EC<\u002Fspan>\n              <span style=\"font-size:9.5px;font-weight:700\">Elias Calder<\u002Fspan>\n            <\u002Fdiv>\n            <article style=\"position:absolute;left:390px;top:330px;width:140px;background:#f5ecd9;border:1px solid #e2d2ae;border-radius:6px;padding:8px;font-family:'Cormorant Garamond',Georgia,serif;font-size:11px;line-height:1.4;transform:rotate(1.2deg)\">Calder watches the rescue from the cliff — he already knew.<\u002Farticle>\n            <div style=\"position:absolute;left:545px;top:300px;width:120px;border:1px solid #ddd5ca;border-radius:8px;overflow:hidden;background:#fff\">\n              <div style=\"height:64px;background:repeating-linear-gradient(45deg,#efe8de 0 8px,#e4d9c9 8px 16px);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,monospace;font-size:8.5px;color:#766c63\">harbor storm · gen<\u002Fdiv>\n              <p style=\"margin:0;padding:5px 7px;font-size:9.5px;color:#38322d;font-weight:600\">Low Harbor in rain<\u002Fp>\n            <\u002Fdiv>\n            <article style=\"position:absolute;left:730px;top:200px;width:130px;background:#fff;border:1px solid #ddd5ca;border-radius:8px;padding:9px;opacity:.38\">\n              <span style=\"background:#f5ecd9;color:#80622c;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Planned<\u002Fspan>\n              <strong style=\"display:block;margin:5px 0 2px;font-size:12px\">Boat in the fog<\u002Fstrong>\n            <\u002Farticle>\n          <\u002Fsection>\n\n          <aside style=\"background:#fcfbf8;border-left:1px solid #ddd5ca;padding:16px 14px;box-sizing:border-box\">\n            <p style=\"color:#754535;font-size:9px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">New scene from region<\u002Fp>\n            <h4 style=\"margin:0 0 4px;font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;font-weight:500\">The false rescue<\u002Fh4>\n            <p style=\"color:#766c63;font-size:10.5px;margin:0 0 12px\">Title suggested from the region’s central beat · editable<\u002Fp>\n            <div style=\"background:#f5ecd9;border:1px solid #e2d2ae;border-radius:7px;padding:10px;margin-bottom:10px\">\n              <p style=\"margin:0 0 7px;font-size:11.5px;line-height:1.5\"><strong>Purpose<\u002Fstrong><br>Mara tests one prediction publicly; partial success earns the town’s fear and her trust in the caller.<\u002Fp>\n              <p style=\"margin:0;font-size:11.5px;line-height:1.5\"><strong>Turn<\u002Fstrong><br>The rescue works — but someone sees Calder expecting it.<\u002Fp>\n            <\u002Fdiv>\n            <p style=\"color:#766c63;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:12px 0 6px\">Carried into the scene<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:8px;margin:7px 0\"><span style=\"width:24px;height:24px;border-radius:6px;background:#e8f0f4;color:#3f6175;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:9px\">B<\u002Fspan><span style=\"font-size:11.5px;flex:1\">Beat · The false rescue<\u002Fspan><span style=\"background:#e8f0f4;color:#3f6175;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Becomes scene<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin:7px 0\"><span style=\"width:24px;height:24px;border-radius:6px;background:#e8f0f4;color:#3f6175;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:9px\">B<\u002Fspan><span style=\"font-size:11.5px;flex:1\">Beat · Low Harbor goes dark<\u002Fspan><span style=\"background:#eee9e2;color:#766c63;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Linked<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin:7px 0\"><span style=\"width:24px;height:24px;border-radius:50%;background:#ded4ca;color:#754535;font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:10px\">E<\u002Fspan><span style=\"font-size:11.5px;flex:1\">Elias Calder<\u002Fspan><span style=\"background:#e7f0e9;color:#3f684f;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Canon<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin:7px 0\"><span style=\"width:24px;height:24px;border-radius:6px;background:#f5ecd9;color:#80622c;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:9px\">N<\u002Fspan><span style=\"font-size:11.5px;flex:1\">Note · Calder on the cliff<\u002Fspan><span style=\"background:#eee9e2;color:#766c63;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Attached<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin:7px 0\"><span style=\"width:24px;height:24px;border-radius:6px;background:#e9e3db;color:#766c63;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:9px\">I<\u002Fspan><span style=\"font-size:11.5px;flex:1\">Image · Low Harbor in rain<\u002Fspan><span style=\"background:#e8f0f4;color:#3f6175;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Provisional<\u002Fspan><\u002Fdiv>\n            <div style=\"background:#e8f0f4;border:1px solid #c9dce5;border-radius:7px;color:#3f6175;font-size:10.5px;line-height:1.5;padding:9px;margin:12px 0\">Cards stay on the canvas. The scene will appear in Draft after “Boat in the fog” — the spine updates automatically.<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px\">\n              <button type=\"button\" style=\"background:#2c2a27;border:1px solid #2c2a27;border-radius:6px;font-weight:700;padding:9px 10px;font-size:12px;color:#fff\">Create scene in Draft<\u002Fbutton>\n              <button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:9px 10px;font-size:12px;color:#28231f\">Edit brief first<\u002Fbutton>\n              <button type=\"button\" style=\"background:transparent;border:1px solid transparent;border-radius:6px;font-weight:700;padding:9px 10px;font-size:12px;color:#766c63\">Just keep as region<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Faside>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:4px\">\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Downward, not duplicated<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">The brief composes from region contents; the created scene is the same object the board and outline will show. No second outline to drift.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Regions are keepable<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">“Just keep as region” names the cluster without creating prose — useful for acts, sequences, or moods that aren’t scenes yet.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Placement is explicit<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">The callout states exactly where the scene will land in Draft before anything is created.<\u002Fp><\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ SPLIT VIEW ============ -->\n  <section id=\"split\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <p style=\"color:#6e3f32;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">Where the journeys meet · Linked writing<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 10px\">Split view — canvas beside the page<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 8px;font-size:15px\">Drafting with the storyboard in sight. Pins tie prose spans to canvas objects in both directions: select a sentence to see its pin glow on the canvas, click a card to jump to its passages. Writer-made pins are solid; AI-detected candidates are dashed and wait for a decision in the link bar.<\u002Fp>\n\n    <div style=\"border:1px solid #d8d0c5;border-radius:14px;margin:20px 0;overflow-x:auto;background:#fff\">\n      <div data-screen-label=\"Split view\" role=\"img\" aria-label=\"Split view concept\" style=\"width:1180px;background:#f5f1ea;color:#28231f;font-family:ui-sans-serif,system-ui,sans-serif;font-size:12px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;background:#fdfcf9;border-bottom:1px solid #ddd5ca;height:52px;padding:0 14px;gap:12px\">\n          <div style=\"display:flex;align-items:baseline;gap:6px\"><span style=\"font-family:'Parisienne',cursive;font-size:25px;line-height:.85;color:#2c2a27\">ghost-writer<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;background:#fff;border:1px solid #ddd5ca;border-radius:7px;overflow:hidden\">\n            <span style=\"padding:6px 12px;font-weight:700;color:#766c63\">Canvas<\u002Fspan>\n            <span style=\"padding:6px 12px;font-weight:700;background:#f2e5df;color:#754535;border-left:1px solid #ddd5ca\">Split<\u002Fspan>\n            <span style=\"padding:6px 12px;font-weight:700;color:#766c63;border-left:1px solid #ddd5ca\">Draft<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"color:#3f684f;font-size:11px;font-weight:700\">Saved locally · just now<\u002Fspan><button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:7px 10px;font-size:12px;color:#28231f\">Focus<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:58px 470px 1fr;min-height:620px\">\n          <nav aria-label=\"Project areas\" style=\"background:#322c27;color:#cbbfb4;display:flex;flex-direction:column;gap:8px;padding:12px 7px;box-sizing:border-box\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">H<\u002Fb>Home<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center;background:#4a4039;border:1px solid #5c5048;color:#fff\"><b style=\"font-size:12px\">D<\u002Fb>Draft<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">C<\u002Fb>Canvas<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">S<\u002Fb>Story<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">R<\u002Fb>Review<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">I<\u002Fb>Inbox<\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">+<\u002Fb>Capture<\u002Fdiv>\n          <\u002Fnav>\n\n          <!-- canvas half -->\n          <section style=\"position:relative;background:#f5f1ea;background-image:radial-gradient(#ddd3c4 1px,transparent 1px);background-size:22px 22px;overflow:hidden;border-right:1px solid #ddd5ca\">\n            <span style=\"position:absolute;top:12px;left:14px;background:#fff;border:1px solid #ddd5ca;border-radius:999px;color:#766c63;font-size:9.5px;font-weight:700;padding:4px 9px\">Following the open scene · The call that hasn’t happened<\u002Fspan>\n            <svg sc-camel-view-box=\"0 0 470 620\" style=\"position:absolute;inset:0;width:100%;height:100%;pointer-events:none\" aria-hidden=\"true\">\n              <path d=\"M 150 180 C 200 240 210 300 230 330\" fill=\"none\" stroke=\"#3f6175\" stroke-width=\"2\" opacity=\".55\"><\u002Fpath>\n              <path d=\"M 120 420 C 200 460 280 430 330 380\" fill=\"none\" stroke=\"#80622c\" stroke-width=\"2\" opacity=\".5\"><\u002Fpath>\n            <\u002Fsvg>\n            <article style=\"position:absolute;left:60px;top:120px;width:170px;background:#fff;border:2px solid #2c2a27;border-radius:8px;padding:10px;box-shadow:0 0 0 4px rgba(117,69,53,.14),0 6px 14px rgba(50,44,39,.12)\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"background:#e7f0e9;color:#3f684f;font-size:8.5px;font-weight:700;border-radius:999px;padding:2px 6px\">Drafted<\u002Fspan><span style=\"width:17px;height:17px;border-radius:50%;background:#754535;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center\">1<\u002Fspan><\u002Fdiv>\n              <strong style=\"display:block;margin:5px 0 2px;font-size:12px\">The call that hasn’t happened<\u002Fstrong>\n              <p style=\"color:#766c63;margin:0;line-height:1.4;font-size:10.5px\">Mara hears her future voice and breaks the station rule.<\u002Fp>\n            <\u002Farticle>\n            <div style=\"position:absolute;left:280px;top:110px;display:flex;flex-direction:column;align-items:center;gap:4px\">\n              <span style=\"position:relative;width:44px;height:44px;border-radius:50%;background:#ded4ca;color:#754535;font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;display:flex;align-items:center;justify-content:center;border:2px solid #3f684f\">MV<span style=\"position:absolute;top:-6px;right:-6px;width:17px;height:17px;border-radius:50%;background:#754535;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,sans-serif\">2<\u002Fspan><\u002Fspan>\n              <span style=\"font-size:9.5px;font-weight:700\">Mara Venn<\u002Fspan>\n            <\u002Fdiv>\n            <article style=\"position:absolute;left:210px;top:330px;width:160px;background:#f5ecd9;border:1px solid #e2d2ae;border-radius:6px;padding:8px;font-family:'Cormorant Garamond',Georgia,serif;font-size:11px;line-height:1.4;transform:rotate(1deg)\">\n              <span style=\"position:absolute;top:-8px;right:-8px;width:17px;height:17px;border-radius:50%;border:2px dashed #3f6175;background:#e8f0f4;color:#3f6175;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,sans-serif\">?<\u002Fspan>\n              The foghorn sounds five minutes before every call — even in clear weather.\n            <\u002Farticle>\n            <div style=\"position:absolute;left:70px;top:400px;width:140px;border:1px solid #ddd5ca;border-radius:8px;overflow:hidden;background:#fff\">\n              <div style=\"height:76px;background:repeating-linear-gradient(45deg,#efe8de 0 8px,#e4d9c9 8px 16px);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,monospace;font-size:9px;color:#766c63;position:relative\">mara · receiver · gen<span style=\"position:absolute;top:4px;right:4px;background:#3f684f;color:#fff;border-radius:999px;font-size:8px;font-weight:800;padding:2px 6px\">★<\u002Fspan><\u002Fdiv>\n              <p style=\"margin:0;padding:5px 7px;font-size:9.5px;color:#38322d;font-weight:600\">Canon reference · Mara<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"position:absolute;left:12px;right:12px;bottom:12px;background:rgba(255,253,250,.94);border:1px solid #ddd5ca;border-radius:8px;padding:8px 11px;font-size:10.5px;color:#766c63\">\n              <strong style=\"color:#28231f\">Pins in this scene:<\u002Fstrong> <span style=\"color:#754535;font-weight:700\">1<\u002Fspan> scene card · <span style=\"color:#754535;font-weight:700\">2<\u002Fspan> Mara Venn · <span style=\"color:#3f6175;font-weight:700\">?<\u002Fspan> detected, undecided\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- editor half -->\n          <section style=\"background:#f5f1ea;padding:16px 18px;box-sizing:border-box;min-width:0\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;background:#fffdfa;border:1px solid #ddd5ca;border-bottom:0;border-radius:8px 8px 0 0;padding:8px 10px\">\n              <div style=\"display:flex;align-items:center;gap:5px;color:#766c63;font-weight:700\"><span style=\"padding:4px 6px\">¶<\u002Fspan><span style=\"padding:4px 6px\">B<\u002Fspan><span style=\"padding:4px 6px\"><em>I<\u002Fem><\u002Fspan><span style=\"padding:4px 6px\">“ ”<\u002Fspan><span style=\"padding:4px 6px;color:#754535\">◉ Pin to canvas<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:5px;color:#766c63;font-weight:700\"><span style=\"padding:4px 6px\">1,284 words<\u002Fspan><span style=\"padding:4px 6px\">•••<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <article style=\"background:#fffefa;border:1px solid #ddd5ca;border-radius:0 0 8px 8px;padding:36px 48px;min-height:420px;box-sizing:border-box\">\n              <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:21px;font-weight:500;margin:0 0 24px;position:relative\">The call that hasn’t happened<span style=\"position:absolute;left:-30px;top:4px;width:17px;height:17px;border-radius:50%;background:#754535;color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,sans-serif\">1<\u002Fspan><\u002Fh2>\n              <p style=\"color:#38322d;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;line-height:1.75;margin:0 0 15px;position:relative\"><span style=\"background:#eaded3;border-bottom:2px solid #754535\">At 2:13 a.m., the radio spoke in Mara’s own voice.<\u002Fspan><span style=\"position:absolute;left:-30px;top:2px;width:17px;height:17px;border-radius:50%;background:#754535;color:#fff;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,sans-serif\">2<\u002Fspan><\u002Fp>\n              <p style=\"color:#38322d;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;line-height:1.75;margin:0 0 15px\">She had been listening to the dead frequency because silence had become another kind of company. The station rules were clear: log the static, touch nothing, and wake Calder if the channel carried anything that sounded like language.<\u002Fp>\n              <p style=\"color:#38322d;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;line-height:1.75;margin:0 0 15px;position:relative\">Outside, <span style=\"border-bottom:2px dashed #3f6175;background:#e8f0f4\">the foghorn sounded once, though the sea was clear<\u002Fspan>.<span style=\"position:absolute;left:-30px;top:2px;width:17px;height:17px;border-radius:50%;border:2px dashed #3f6175;background:#e8f0f4;color:#3f6175;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;font-family:ui-sans-serif,system-ui,sans-serif;box-sizing:border-box\">?<\u002Fspan><\u002Fp>\n              <p style=\"color:#38322d;font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;line-height:1.75;margin:0\">“Bellwether Light, do not answer,” the radio said. Her voice sounded older. Tired in a way Mara had not yet earned.<\u002Fp>\n            <\u002Farticle>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;background:#e8f0f4;border:1px solid #c9dce5;border-radius:8px;margin-top:10px;padding:9px 12px\">\n              <span style=\"color:#3f6175;font-size:11.5px\"><strong>Detected link:<\u002Fstrong> “the foghorn sounded once…” may reference the note <em>Foghorn before every call<\u002Fem> · matched on 2 passages<\u002Fspan>\n              <div style=\"display:flex;gap:6px\">\n                <button type=\"button\" style=\"background:#fff;border:1px solid #c9dce5;border-radius:6px;font-weight:700;padding:5px 10px;font-size:11px;color:#3f6175\">Link it<\u002Fbutton>\n                <button type=\"button\" style=\"background:transparent;border:1px solid transparent;border-radius:6px;font-weight:700;padding:5px 10px;font-size:11px;color:#766c63\">Not related<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:4px\">\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Pins are symmetric<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">The same numbered badge appears on the prose span and the canvas object. Selection on either side lights up both.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Detected ≠ decided<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">AI candidates use a dashed “?” pin and a quiet link bar. Dismissing is one tap and remembered — the model won’t re-ask.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">The canvas follows<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">In split view the canvas auto-centers on the open scene’s cluster. Panning away pauses following; a chip offers to resume.<\u002Fp><\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ BOOK READER ============ -->\n  <section id=\"book\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <p style=\"color:#6e3f32;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">Reading &amp; review · Bound pages<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 10px\">Book reader<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 8px;font-size:15px\">A distraction-free way to read the manuscript as a bound book — typeset spreads, chapter flipping, page numbers. Every passage that connects to the storyboard carries a faint ✦ mark; hovering it surfaces the linked canvas object — a character, place, scene, note, or thread — without leaving the page. Use the arrows or chapter tabs to flip; toggle the marks off for pure reading.<\u002Fp>\n\n    <div style=\"border:1px solid #d8d0c5;border-radius:14px;margin:20px 0;overflow-x:auto;background:#fff\">\n      <div data-screen-label=\"Book reader\" role=\"img\" aria-label=\"Book reader concept\" style=\"width:1180px;background:#f5f1ea;color:#28231f;font-family:ui-sans-serif,system-ui,sans-serif;font-size:12px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;background:#fdfcf9;border-bottom:1px solid #ddd5ca;height:52px;padding:0 14px;gap:12px\">\n          <div style=\"display:flex;align-items:baseline;gap:6px\"><span style=\"font-family:'Parisienne',cursive;font-size:25px;line-height:.85;color:#2c2a27\">ghost-writer<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;background:#fff;border:1px solid #ddd5ca;border-radius:7px;overflow:hidden\">\n            <span style=\"padding:6px 12px;font-weight:700;color:#766c63\">Manuscript<\u002Fspan>\n            <span style=\"padding:6px 12px;font-weight:700;color:#766c63;border-left:1px solid #ddd5ca\">Split<\u002Fspan>\n            <span style=\"padding:6px 12px;font-weight:700;background:#f2e5df;color:#754535;border-left:1px solid #ddd5ca\">Reader<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px\">\n            <button type=\"button\" sc-camel-on-click=\"{{ toggleLinks }}\" style=\"{{ toggleStyle }}\">◉ {{ linksLabel }}<\u002Fbutton>\n            <button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:7px 10px;font-size:12px;color:#28231f\">Focus<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:58px 1fr;min-height:640px\">\n          <nav aria-label=\"Project areas\" style=\"background:#322c27;color:#cbbfb4;display:flex;flex-direction:column;gap:8px;padding:12px 7px;box-sizing:border-box\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">H<\u002Fb>Home<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center;background:#4a4039;border:1px solid #5c5048;color:#fff\"><b style=\"font-size:12px\">D<\u002Fb>Draft<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">C<\u002Fb>Canvas<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">S<\u002Fb>Story<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">R<\u002Fb>Review<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">I<\u002Fb>Inbox<\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:42px;border-radius:7px;font-size:8px;text-align:center\"><b style=\"font-size:12px\">+<\u002Fb>Capture<\u002Fdiv>\n          <\u002Fnav>\n\n          <section style=\"background:radial-gradient(ellipse at 50% 15%,#efe8dd,#e2dacd 85%);display:flex;flex-direction:column;align-items:center;gap:20px;padding:28px 24px 24px;box-sizing:border-box;min-width:0\">\n\n            <!-- SPREAD 0 · Chapter One -->\n            <sc-if value=\"{{ isSpread0 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;border-radius:5px;box-shadow:0 34px 60px -24px rgba(40,33,26,.55);animation:bk-turn .42s ease\">\n                <div style=\"position:relative;width:352px;height:488px;background:linear-gradient(90deg,#e9e0d0,#fffdf8 11%);padding:38px 30px 34px 40px;box-sizing:border-box;box-shadow:inset -22px 0 30px -24px rgba(60,48,34,.55);border-radius:5px 0 0 5px\">\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#a99e92;margin-bottom:26px\"><span>12<\u002Fspan><span>The Signal at Bellwether<\u002Fspan><\u002Fdiv>\n                  <p style=\"font-family:'Jost',sans-serif;text-align:center;letter-spacing:.32em;font-size:9px;text-transform:uppercase;color:#b3a99d;margin:0 0 4px\">One<\u002Fp>\n                  <h3 style=\"font-family:'Cormorant Garamond',serif;text-align:center;font-weight:600;font-size:21px;margin:0 0 16px;color:#2c2a27\">Low Tide<\u002Fh3>\n                  <div style=\"width:38px;height:1px;background:#cbc2b6;margin:0 auto 20px\"><\u002Fdiv>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\"><span style=\"float:left;font-family:'Cormorant Garamond',serif;font-size:50px;line-height:.74;font-weight:600;padding:5px 8px 0 0;color:#2c2a27\">T<\u002Fspan>he lamp at <span data-link=\"bellwether\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">Bellwether Light<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan> had not failed in ninety years, and <span data-link=\"mara\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">Mara<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan> did not intend to be the keeper who broke its record. She climbed the ninety-nine steps twice a night, logged the weather, and spoke to no one but the sea.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\"><span data-link=\"logbook\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">The last entry in the previous keeper’s log ended mid-sentence<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan>, the pen still clipped to the page as though he had meant to return before the tide.<\u002Fp>\n                  <span style=\"position:absolute;left:40px;bottom:22px;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.2em;color:#c3b9ac\">·  ✦  ·<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"position:relative;width:352px;height:488px;background:linear-gradient(-90deg,#e9e0d0,#fffdf8 11%);padding:38px 40px 34px 30px;box-sizing:border-box;box-shadow:inset 22px 0 30px -24px rgba(60,48,34,.55);border-radius:0 5px 5px 0\">\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#a99e92;margin-bottom:26px\"><span>Chapter One<\u002Fspan><span>13<\u002Fspan><\u002Fdiv>\n                  <p style=\"margin:22px 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">By the third week the silence had become another kind of company. She tuned past the carrier by ear, compensating before the needle caught up, and told herself the habit meant nothing.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">The dead frequency was supposed to stay dead. That was the whole of the arrangement between a keeper and the dark: she watched, and it kept its distance.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">Then, on the ninth night of the storm, it did not.<\u002Fp>\n                  <span style=\"position:absolute;right:40px;bottom:22px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:#b3a99d\">12 / 48<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- SPREAD 1 · Chapter Two -->\n            <sc-if value=\"{{ isSpread1 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;border-radius:5px;box-shadow:0 34px 60px -24px rgba(40,33,26,.55);animation:bk-turn .42s ease\">\n                <div style=\"position:relative;width:352px;height:488px;background:linear-gradient(90deg,#e9e0d0,#fffdf8 11%);padding:38px 30px 34px 40px;box-sizing:border-box;box-shadow:inset -22px 0 30px -24px rgba(60,48,34,.55);border-radius:5px 0 0 5px\">\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#a99e92;margin-bottom:26px\"><span>26<\u002Fspan><span>The Signal at Bellwether<\u002Fspan><\u002Fdiv>\n                  <p style=\"font-family:'Jost',sans-serif;text-align:center;letter-spacing:.32em;font-size:9px;text-transform:uppercase;color:#b3a99d;margin:0 0 4px\">Two<\u002Fp>\n                  <h3 style=\"font-family:'Cormorant Garamond',serif;text-align:center;font-weight:600;font-size:21px;margin:0 0 16px;color:#2c2a27\">Static<\u002Fh3>\n                  <div style=\"width:38px;height:1px;background:#cbc2b6;margin:0 auto 20px\"><\u002Fdiv>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\"><span style=\"float:left;font-family:'Cormorant Garamond',serif;font-size:50px;line-height:.74;font-weight:600;padding:5px 8px 0 0;color:#2c2a27\">T<\u002Fspan>he <span data-link=\"rule\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">station rule<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan> was the first thing he taught her: log the static, touch nothing, and wake him if the channel carried anything that sounded like language.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\"><span data-link=\"calder\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">Calder<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan> had kept the light for thirty years and spoke of it the way other men spoke of a marriage — a duty worn smooth into love.<\u002Fp>\n                  <span style=\"position:absolute;left:40px;bottom:22px;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.2em;color:#c3b9ac\">·  ✦  ·<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"position:relative;width:352px;height:488px;background:linear-gradient(-90deg,#e9e0d0,#fffdf8 11%);padding:38px 40px 34px 30px;box-sizing:border-box;box-shadow:inset 22px 0 30px -24px rgba(60,48,34,.55);border-radius:0 5px 5px 0\">\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#a99e92;margin-bottom:26px\"><span>Chapter Two<\u002Fspan><span>27<\u002Fspan><\u002Fdiv>\n                  <p style=\"margin:22px 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">At <span data-link=\"call\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">2:13 a.m., the radio spoke in Mara’s own voice<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan>.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\"><em>Bellwether Light, do not answer,<\u002Fem> it said. Her voice sounded older. Tired in a way she had not yet earned.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">She did not wake Calder. She leaned close, breathing the receiver’s hot dust, as if the impossible might tell the truth at whisper range.<\u002Fp>\n                  <span style=\"position:absolute;right:40px;bottom:22px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:#b3a99d\">26 / 48<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- SPREAD 2 · Chapter Three -->\n            <sc-if value=\"{{ isSpread2 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;border-radius:5px;box-shadow:0 34px 60px -24px rgba(40,33,26,.55);animation:bk-turn .42s ease\">\n                <div style=\"position:relative;width:352px;height:488px;background:linear-gradient(90deg,#e9e0d0,#fffdf8 11%);padding:38px 30px 34px 40px;box-sizing:border-box;box-shadow:inset -22px 0 30px -24px rgba(60,48,34,.55);border-radius:5px 0 0 5px\">\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#a99e92;margin-bottom:26px\"><span>40<\u002Fspan><span>The Signal at Bellwether<\u002Fspan><\u002Fdiv>\n                  <p style=\"font-family:'Jost',sans-serif;text-align:center;letter-spacing:.32em;font-size:9px;text-transform:uppercase;color:#b3a99d;margin:0 0 4px\">Three<\u002Fp>\n                  <h3 style=\"font-family:'Cormorant Garamond',serif;text-align:center;font-weight:600;font-size:21px;margin:0 0 16px;color:#2c2a27\">Blackout<\u002Fh3>\n                  <div style=\"width:38px;height:1px;background:#cbc2b6;margin:0 auto 20px\"><\u002Fdiv>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\"><span style=\"float:left;font-family:'Cormorant Garamond',serif;font-size:50px;line-height:.74;font-weight:600;padding:5px 8px 0 0;color:#2c2a27\">O<\u002Fspan>utside, <span data-link=\"foghorn\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">the foghorn sounded once<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan>, though the sea was clear and the night held no weather at all.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">She had stopped pretending the calls were interference. They came from <span data-link=\"future\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">her own voice — or the voice she would have in a winter she had not yet lived<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan>.<\u002Fp>\n                  <span style=\"position:absolute;left:40px;bottom:22px;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.2em;color:#c3b9ac\">·  ✦  ·<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"position:relative;width:352px;height:488px;background:linear-gradient(-90deg,#e9e0d0,#fffdf8 11%);padding:38px 40px 34px 30px;box-sizing:border-box;box-shadow:inset 22px 0 30px -24px rgba(60,48,34,.55);border-radius:0 5px 5px 0\">\n                  <div style=\"display:flex;justify-content:space-between;font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#a99e92;margin-bottom:26px\"><span>Chapter Three<\u002Fspan><span>41<\u002Fspan><\u002Fdiv>\n                  <p style=\"margin:22px 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">When <span data-link=\"harbor\" sc-camel-on-mouse-enter=\"{{ onLinkEnter }}\" sc-camel-on-mouse-leave=\"{{ onLinkLeave }}\" style=\"border-bottom:1px dotted #b7935f;cursor:help\" style-hover=\"background:#f3ead9;border-radius:2px\">Low Harbor went dark<sc-if value=\"{{ showLinks }}\" hint-placeholder-val=\"{{ true }}\"><sup style=\"font-size:7px;color:#b7935f;font-family:'Jost',sans-serif\">✦<\u002Fsup><\u002Fsc-if><\u002Fspan>, the town blamed the lighthouse, and the call predicted a rescue no one had asked for.<\u002Fp>\n                  <p style=\"margin:0 0 12px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:14.5px;line-height:1.85;color:#312c26;text-align:justify;hyphens:auto\">Mara wrote the time in the margin of the log — the first entry she had ever made that described something which had not happened yet.<\u002Fp>\n                  <span style=\"position:absolute;right:40px;bottom:22px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:#b3a99d\">40 / 48<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- FLIPPER -->\n            <div style=\"display:flex;align-items:center;gap:10px;background:#fffdfa;border:1px solid #ddd5ca;border-radius:11px;padding:8px 10px;box-shadow:0 6px 16px rgba(50,44,39,.1)\">\n              <button type=\"button\" sc-camel-on-click=\"{{ prev }}\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:7px;width:30px;height:30px;font-size:14px;color:#2c2a27;cursor:pointer\">‹<\u002Fbutton>\n              <button type=\"button\" sc-camel-on-click=\"{{ go0 }}\" style=\"{{ tab0Style }}\">I · Low Tide<\u002Fbutton>\n              <button type=\"button\" sc-camel-on-click=\"{{ go1 }}\" style=\"{{ tab1Style }}\">II · Static<\u002Fbutton>\n              <button type=\"button\" sc-camel-on-click=\"{{ go2 }}\" style=\"{{ tab2Style }}\">III · Blackout<\u002Fbutton>\n              <button type=\"button\" sc-camel-on-click=\"{{ next }}\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:7px;width:30px;height:30px;font-size:14px;color:#2c2a27;cursor:pointer\">›<\u002Fbutton>\n              <span style=\"width:1px;height:22px;background:#e2dacd;margin:0 2px\"><\u002Fspan>\n              <span style=\"font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#a99e92\">Pages {{ pageRange }} · 48<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- hover popover (fixed, driven by state) -->\n    <sc-if value=\"{{ showPop }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"{{ popStyle }}\">\n        <div style=\"width:220px;background:#fff;border:1px solid #ddd5ca;border-radius:11px;box-shadow:0 16px 38px -12px rgba(40,33,26,.45);overflow:hidden\">\n          <sc-if value=\"{{ detHasImg }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"height:76px;background:repeating-linear-gradient(45deg,#efe8de 0 8px,#e4d9c9 8px 16px);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,monospace;font-size:8.5px;color:#766c63\">{{ det.imgCaption }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"padding:11px 12px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px\">\n              <span style=\"flex:none;width:30px;height:30px;border-radius:7px;background:#ded4ca;color:#754535;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center\">{{ det.glyph }}<\u002Fspan>\n              <div style=\"min-width:0\">\n                <div style=\"font-family:'Jost',sans-serif;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#a99e92\">{{ det.type }}<\u002Fdiv>\n                <strong style=\"font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:#2c2a27;line-height:1.15\">{{ det.title }}<\u002Fstrong>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"display:inline-block;background:{{ det.chipBg }};color:{{ det.chipColor }};font-family:'Jost',sans-serif;font-size:8.5px;font-weight:600;border-radius:999px;padding:2px 8px;letter-spacing:.03em\">{{ det.chip }}<\u002Fspan>\n            <p style=\"font-family:ui-sans-serif,system-ui,sans-serif;color:#6c645b;font-size:11px;line-height:1.5;margin:8px 0 0\">{{ det.body }}<\u002Fp>\n            <p style=\"display:flex;align-items:center;gap:5px;font-family:'Jost',sans-serif;font-size:8.5px;letter-spacing:.11em;text-transform:uppercase;color:#3f6175;margin:9px 0 0\"><span style=\"font-size:9px\">↳<\u002Fspan>{{ det.where }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:4px\">\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Reading is a first-class mode<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">The same manuscript objects render as bound pages — no export, no separate file. Chapter flips are views over the spine, not copies.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Links surface on demand<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">A faint ✦ marks a passage that connects to the storyboard; hovering reveals the canvas object with its authority state. Toggling marks off gives a clean reading page.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Same trust vocabulary<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">Popovers reuse the Canon / Planned / Inferred chips, so a reader always knows whether a linked detail is confirmed, planned, or a model inference.<\u002Fp><\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ IMAGERY LIFECYCLE ============ -->\n  <section id=\"imagery\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <p style=\"color:#6e3f32;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">Trust model · Concept art<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 10px\">Imagery lifecycle — generated to canon<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 8px;font-size:15px\">Concept art follows the same authority ladder as facts. Every image keeps its prompt receipt forever; only an explicit writer confirmation promotes it to canon reference art, which then appears in the Story bible and in scene context.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:14px;align-items:stretch;margin:22px 0\">\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:14px\">\n        <span style=\"background:#e8f0f4;color:#3f6175;font-size:10px;font-weight:700;border-radius:999px;padding:3px 8px\">1 · Generated · provisional<\u002Fspan>\n        <div style=\"height:110px;background:repeating-linear-gradient(45deg,#efe8de 0 8px,#e4d9c9 8px 16px);border-radius:7px;margin:11px 0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,monospace;font-size:10px;color:#766c63;border:1px dashed #adc7d3\">4 options · gen batch<\u002Fdiv>\n        <p style=\"color:#6c645b;font-size:12.5px;line-height:1.55;margin:0\">Arrives in a review tray, never directly on the canvas. Prompt, provider, and cost are recorded. Unpicked options can be discarded in bulk.<\u002Fp>\n      <\u002Farticle>\n      <div style=\"display:flex;align-items:center;color:#9a8f83;font-size:20px\">→<\u002Fdiv>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:14px\">\n        <span style=\"background:#eee9e2;color:#6c645b;font-size:10px;font-weight:700;border-radius:999px;padding:3px 8px\">2 · Kept on canvas<\u002Fspan>\n        <div style=\"height:110px;background:repeating-linear-gradient(45deg,#efe8de 0 8px,#e4d9c9 8px 16px);border-radius:7px;margin:11px 0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,monospace;font-size:10px;color:#766c63;border:1px solid #d8d0c5\">mara · receiver · opt 3<\u002Fdiv>\n        <p style=\"color:#6c645b;font-size:12.5px;line-height:1.55;margin:0\">A kept image is a mood object: movable, linkable to entities and scenes, still labeled provisional. It never appears in Story surfaces.<\u002Fp>\n      <\u002Farticle>\n      <div style=\"display:flex;align-items:center;color:#9a8f83;font-size:20px\">→<\u002Fdiv>\n      <article style=\"background:#fff;border:2px solid #3f684f;border-radius:10px;padding:14px\">\n        <span style=\"background:#e7f0e9;color:#3f684f;font-size:10px;font-weight:700;border-radius:999px;padding:3px 8px\">3 · ★ Canon reference<\u002Fspan>\n        <div style=\"height:110px;background:repeating-linear-gradient(45deg,#efe8de 0 8px,#e4d9c9 8px 16px);border-radius:7px;margin:11px 0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,monospace;font-size:10px;color:#766c63;border:1px solid #3f684f\">canon · mara venn<\u002Fdiv>\n        <p style=\"color:#6c645b;font-size:12.5px;line-height:1.55;margin:0\">Writer-confirmed. Appears on the entity’s Story page and in scene context, and future generations for this entity use it as visual reference. Demoting back to provisional is one action, logged.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:4px\">\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">No ambient generation<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">Images are only generated on an explicit request scoped to a selection — never speculatively in the background.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Canon means consistency<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">Once a reference is canon, later generations of the same entity are conditioned on it — the visual world stops drifting.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Receipts survive deletion<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">Discarding an image keeps its prompt and decision in local history, so “what did we try for Mara?” is answerable.<\u002Fp><\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ CARRY-OVER ============ -->\n  <section id=\"carryover\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <p style=\"color:#6e3f32;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">Continuity with 1.0<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 10px\">What changes in the 1.0 surfaces<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 14px;font-size:15px\">Every other 1.0 mockup remains valid. These are the deltas the canvas introduces:<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px\">\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:15px\"><h4 style=\"margin:0 0 5px;font-size:13.5px\">Project rail<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.55\"><strong>Plan → Canvas.<\u002Fstrong> Outline and Timeline become view modes inside Canvas. Keyboard positions and muscle memory are preserved.<\u002Fp><\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:15px\"><h4 style=\"margin:0 0 5px;font-size:13.5px\">Project home<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.55\">“Useful next moves” can point at canvas gaps (“Act II has no turn between two beats”) and at unreviewed derived elements.<\u002Fp><\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:15px\"><h4 style=\"margin:0 0 5px;font-size:13.5px\">Manuscript studio<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.55\">The context inspector gains <strong>Show on canvas<\u002Fstrong>, and the selection menu gains <strong>Pin to canvas<\u002Fstrong> next to Link to story.<\u002Fp><\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:15px\"><h4 style=\"margin:0 0 5px;font-size:13.5px\">Story bible<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.55\">Entity pages show canon reference art and a “Placements” row listing where the entity appears on the canvas.<\u002Fp><\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:15px\"><h4 style=\"margin:0 0 5px;font-size:13.5px\">Inbox &amp; proposals<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.55\">Proposals can now target the canvas (ghost cards, suggested threads, detected links) using the same review anatomy — outcome, evidence, scope, decisions.<\u002Fp><\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:15px\"><h4 style=\"margin:0 0 5px;font-size:13.5px\">Mobile capture<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.55\">A capture can be filed “to canvas” as a note tile. Mobile canvas is read-and-review only: pan, inspect, decide on ghosts — no freeform editing.<\u002Fp><\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ STATES ============ -->\n  <section id=\"states\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 12px\">New states the production design must cover<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 14px;font-size:15px\">Additive to the 1.0 states matrix.<\u002Fp>\n    <div style=\"overflow-x:auto;border:1px solid #d8d0c5;border-radius:10px\">\n      <sc-raw-table style=\"border-collapse:collapse;width:100%;font-size:13.5px;background:#fff\">\n        <sc-raw-thead>\n          <sc-raw-tr>\n            <sc-raw-th style=\"text-align:left;padding:11px 14px;border-bottom:2px solid #d8d0c5;background:#f2eee7;width:180px\">Area<\u002Fsc-raw-th>\n            <sc-raw-th style=\"text-align:left;padding:11px 14px;border-bottom:2px solid #d8d0c5;background:#f2eee7\">Required states before build acceptance<\u002Fsc-raw-th>\n          <\u002Fsc-raw-tr>\n        <\u002Fsc-raw-thead>\n        <sc-raw-tbody>\n          <sc-raw-tr><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;font-weight:700\">Canvas<\u002Fsc-raw-td><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;color:#4c453e\">Empty, seeded from spark, populated, region selected, ghost elements pending, spine out of sync with Draft, zoomed-out overview, very large board (500+ objects), read-only recovery<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;font-weight:700\">Derivation run<\u002Fsc-raw-td><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;color:#4c453e\">Not run, scoping, reading, partial results, complete, canceled mid-run, provider unavailable, stale after manuscript edits, reject-all<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;font-weight:700\">Links &amp; pins<\u002Fsc-raw-td><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;color:#4c453e\">Writer-made, AI-detected undecided, confirmed, rejected (remembered), stale after prose edit, broken (target deleted), bulk review<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;font-weight:700\">Imagery<\u002Fsc-raw-td><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;color:#4c453e\">Requested, generating, options tray, kept provisional, canon reference, demoted, regenerating with canon conditioning, discarded (receipt kept), provider failed<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;font-weight:700\">Scene handoff<\u002Fsc-raw-td><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;color:#4c453e\">Region drawn, brief composing, brief edited, scene created, handoff undone, source region kept, orphaned region after scene deletion<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n          <sc-raw-tr><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;font-weight:700\">Split view<\u002Fsc-raw-td><sc-raw-td style=\"padding:10px 14px;border-top:1px solid #e6dfd4;color:#4c453e\">Following scene, follow paused, pin selected on either side, detected-link bar, no canvas objects for scene, narrow-width fallback to tabs<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n        <\u002Fsc-raw-tbody>\n      <\u002Fsc-raw-table>\n    <\u002Fdiv>\n    <p style=\"color:#6c645b;font-size:13px;margin:20px 0 0\">Next steps: mobile canvas review concepts · Outline and Timeline view modes of the canvas · “✦ Ask” scoped-request anatomy · canon-conditioned regeneration flow.<\u002Fp>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showNotes&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Document&quot;},&quot;showPressure&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Canvas hero&quot;,&quot;description&quot;:&quot;Show the narrative-pressure overlay on the canvas workspace mockup&quot;}}\">\nclass Component extends DCLogic {\n  state = { spreadIndex: 0, showLinks: true, hover: null, popX: 0, popY: 0 };\n\n  onLinkEnter = (e) => {\n    if (!this.state.showLinks) return;\n    const el = e.currentTarget;\n    const r = el.getBoundingClientRect();\n    this.setState({ hover: el.getAttribute('data-link'), popX: r.left + r.width / 2, popY: r.top });\n  };\n  onLinkLeave = () => { if (this.state.hover) this.setState({ hover: null }); };\n  goTo = (i) => this.setState({ spreadIndex: i, hover: null });\n\n  renderVals() {\n    const details = {\n      bellwether: { type: 'Place · Canon', glyph: 'BL', title: 'Bellwether Light', chip: 'Canon', chipBg: '#e7f0e9', chipColor: '#3f684f', body: 'The lighthouse and keeper’s station — the anchor of Act I.', img: true, imgCaption: 'bellwether · dusk · canon', where: 'Canvas · Act I' },\n      mara: { type: 'Character · Canon', glyph: 'MV', title: 'Mara Venn', chip: '7 confirmed facts', chipBg: '#e7f0e9', chipColor: '#3f684f', body: 'Reluctant keeper; practical until the radio speaks in her own voice.', img: false, where: 'Canvas · Acts I–III' },\n      logbook: { type: 'Thread · inferred', glyph: '✎', title: 'The missing logbook', chip: 'Unconfirmed', chipBg: '#e8f0f4', chipColor: '#3f6175', body: 'The previous keeper’s log ends mid-sentence and recurs across four passages.', img: false, where: 'Canvas · detected link' },\n      rule: { type: 'World rule', glyph: '§', title: 'Station rule · Channel 9', chip: 'Planned', chipBg: '#f5ecd9', chipColor: '#80622c', body: 'Log the static, touch nothing, wake Calder if the channel sounds like language.', img: false, where: 'Canvas · Act I' },\n      calder: { type: 'Character · Canon', glyph: 'EC', title: 'Elias Calder', chip: 'Canon', chipBg: '#e7f0e9', chipColor: '#3f684f', body: 'Thirty years the keeper; knows more about the frequency than he admits.', img: false, where: 'Canvas · Acts I–II' },\n      call: { type: 'Scene · drafted', glyph: 'S3', title: 'The call that hasn’t happened', chip: 'Drafted · Turn', chipBg: '#e7f0e9', chipColor: '#3f684f', body: 'Mara hears her future voice and breaks the station rule.', img: false, where: 'Canvas · Act I' },\n      foghorn: { type: 'Note', glyph: '✱', title: 'Foghorn before every call', chip: 'Captured', chipBg: '#eee9e2', chipColor: '#766c63', body: 'The foghorn sounds five minutes before a call — even in clear weather.', img: false, where: 'Canvas · note' },\n      future: { type: 'Beat · thread', glyph: '◑', title: 'The voice from tomorrow', chip: 'Thread', chipBg: '#e8f0f4', chipColor: '#3f6175', body: 'The calls come from a winter Mara has not yet lived.', img: false, where: 'Canvas · “Who sends the calls?”' },\n      harbor: { type: 'Scene · planned', glyph: 'S4', title: 'Low Harbor goes dark', chip: 'Planned', chipBg: '#f5ecd9', chipColor: '#80622c', body: 'The town blames the lighthouse while the call predicts a rescue.', img: true, imgCaption: 'low harbor · rain · gen', where: 'Canvas · Act II' }\n    };\n    const d = this.state.hover ? details[this.state.hover] : null;\n    const i = this.state.spreadIndex;\n    const tab = (active) => ({\n      fontFamily: \"'Jost',sans-serif\", fontSize: '11px', fontWeight: 600, cursor: 'pointer',\n      padding: '6px 12px', borderRadius: '6px', border: 'none',\n      background: active ? '#2c2a27' : 'transparent', color: active ? '#fff' : '#766c63'\n    });\n    return {\n      isSpread0: i === 0, isSpread1: i === 1, isSpread2: i === 2,\n      showLinks: this.state.showLinks,\n      prev: () => this.setState((s) => ({ spreadIndex: Math.max(0, s.spreadIndex - 1), hover: null })),\n      next: () => this.setState((s) => ({ spreadIndex: Math.min(2, s.spreadIndex + 1), hover: null })),\n      go0: () => this.goTo(0), go1: () => this.goTo(1), go2: () => this.goTo(2),\n      tab0Style: tab(i === 0), tab1Style: tab(i === 1), tab2Style: tab(i === 2),\n      toggleLinks: () => this.setState((s) => ({ showLinks: !s.showLinks, hover: null })),\n      linksLabel: this.state.showLinks ? 'Links on' : 'Links off',\n      toggleStyle: {\n        fontFamily: \"'Jost',sans-serif\", fontSize: '11px', fontWeight: 600, cursor: 'pointer',\n        padding: '7px 11px', borderRadius: '6px',\n        border: '1px solid ' + (this.state.showLinks ? '#2c2a27' : '#ddd5ca'),\n        background: this.state.showLinks ? '#2c2a27' : '#fff',\n        color: this.state.showLinks ? '#fff' : '#766c63'\n      },\n      onLinkEnter: this.onLinkEnter, onLinkLeave: this.onLinkLeave,\n      pageRange: ['12–13', '26–27', '40–41'][i],\n      showPop: !!d, det: d || {}, detHasImg: !!(d && d.img),\n      popStyle: { position: 'fixed', left: this.state.popX + 'px', top: (this.state.popY - 14) + 'px', transform: 'translate(-50%,-100%)', zIndex: 40, pointerEvents: 'none' },\n      showNotes: this.props.showNotes ?? true,\n      showPressure: this.props.showPressure ?? false\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
