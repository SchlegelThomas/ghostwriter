  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  const proposalTemplate = document.getElementById('__ghostwriter_ux_proposal');
  const proposalMarkup = proposalTemplate ? proposalTemplate.innerHTML : '';
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    if (proposalMarkup) {
      const mountProposal = function(attempt) {
        if (document.getElementById('ux-proposal-fs-dag')) return;
        if (!document.body) {
          if (attempt < 20) setTimeout(function() { mountProposal(attempt + 1); }, 50);
          return;
        }

        const holder = document.createElement('div');
        holder.innerHTML = proposalMarkup;
        while (holder.firstChild) document.body.appendChild(holder.firstChild);

        const proposal = document.getElementById('ux-proposal-fs-dag');
        const app = proposal && proposal.querySelector('[data-gwux-app]');
        const canvas = proposal && proposal.querySelector('[data-gwux-canvas]');
        const status = proposal && proposal.querySelector('[data-gwux-status]');
        const scope = proposal && proposal.querySelector('[data-gwux-scope]');
        const inspectorTitle = proposal && proposal.querySelector('[data-gwux-inspector-title]');
        const inspectorCopy = proposal && proposal.querySelector('[data-gwux-inspector-copy]');
        const toast = proposal && proposal.querySelector('[data-gwux-toast-output]');
        const toastTitle = proposal && proposal.querySelector('[data-gwux-toast-title]');
        const toastDetail = proposal && proposal.querySelector('[data-gwux-toast-detail]');
        const reduceMotion = window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        const depthCopy = {
          project: {
            scope: 'Project lens · 3 chapters · 2 cross-book threads',
            title: 'Chapter 2',
            copy: 'Shape structure here without leaving the tree or Canvas. Fields commit through the same versioned commands.'
          },
          chapter: {
            scope: 'Chapter lens · Dead frequency · sibling context dimmed',
            title: 'Dead frequency',
            copy: 'Chapter scenes, local relationships, continuity findings, and plan-to-Draft actions are now primary.'
          },
          scene: {
            scope: 'Scene lens · The call that hasn’t happened',
            title: 'The call',
            copy: 'Inspect the selected scene, its inbound and outbound links, brief, history, and Draft handoff.'
          }
        };

        function setDepth(nextDepth, moveFocus) {
          if (!app || !depthCopy[nextDepth]) return;
          app.dataset.depth = nextDepth;
          if (scope) scope.textContent = depthCopy[nextDepth].scope;
          if (inspectorTitle) inspectorTitle.textContent = depthCopy[nextDepth].title;
          if (inspectorCopy) inspectorCopy.textContent = depthCopy[nextDepth].copy;
          if (moveFocus && canvas) {
            const delay = reduceMotion ? 0 : 470;
            setTimeout(function() {
              const heading = proposal.querySelector('[data-gwux-focus]');
              if (nextDepth === 'chapter' && heading) heading.focus();
              else canvas.focus();
            }, delay);
          }
        }

        proposal.querySelectorAll('[data-gwux-drill]').forEach(function(control) {
          control.addEventListener('click', function() {
            const target = control.getAttribute('data-gwux-drill');
            if (target === 'up') {
              setDepth(app && app.dataset.depth === 'scene' ? 'chapter' : 'project', true);
            } else {
              setDepth(target, true);
            }
          });
        });

        proposal.addEventListener('keydown', function(event) {
          if (event.key !== 'Escape' || !app || app.dataset.depth === 'project') return;
          event.preventDefault();
          setDepth(app.dataset.depth === 'scene' ? 'chapter' : 'project', true);
        });

        proposal.querySelectorAll('[data-gwux-workflow]').forEach(function(control) {
          control.addEventListener('click', function() {
            if (!app) return;
            const workflow = control.getAttribute('data-gwux-workflow');
            app.dataset.workflow = workflow;
            proposal.querySelectorAll('[data-gwux-workflow]').forEach(function(candidate) {
              candidate.setAttribute('aria-pressed', String(candidate === control));
            });
          });
        });

        const toastCopy = {
          structure: {
            kind: 'success',
            title: 'Chapter renamed',
            detail: 'Dead frequency · Saved to project',
            action: 'Undo'
          },
          canvas: {
            kind: 'success',
            title: 'Relationship linked',
            detail: 'Thread connected · Canvas version 18',
            action: 'Undo'
          },
          conflict: {
            kind: 'conflict',
            title: 'Canvas changed elsewhere',
            detail: 'Your action changed nothing. Review the latest board.',
            action: 'Reload Canvas'
          }
        };

        function showToast(kind) {
          if (!toast || !toastCopy[kind]) return;
          const copy = toastCopy[kind];
          if (status) status.textContent = kind === 'conflict' ? 'Conflict · review changes' : 'Saving…';
          const reveal = function() {
            toast.dataset.kind = copy.kind;
            toast.dataset.visible = 'true';
            if (toastTitle) toastTitle.textContent = copy.title;
            if (toastDetail) toastDetail.textContent = copy.detail;
            const action = toast.querySelector('button');
            if (action) action.textContent = copy.action;
            if (status) {
              status.textContent = kind === 'conflict' ? 'Conflict · review changes' : 'All changes saved';
            }
          };
          if (kind === 'conflict' || reduceMotion) reveal();
          else setTimeout(reveal, 480);
        }

        proposal.querySelectorAll('[data-gwux-toast]').forEach(function(control) {
          control.addEventListener('click', function() {
            showToast(control.getAttribute('data-gwux-toast'));
          });
        });
        proposal.querySelectorAll('[data-gwux-toast-close]').forEach(function(control) {
          control.addEventListener('click', function() {
            if (toast) toast.dataset.visible = 'false';
          });
        });

        const addIndexLink = function(indexAttempt) {
          const nav = document.querySelector('nav[aria-label="Mockup index"]');
          if (!nav) {
            if (indexAttempt < 20) setTimeout(function() { addIndexLink(indexAttempt + 1); }, 100);
            return;
          }
          nav.style.zIndex = '1000';
          if (nav.querySelector('a[href="#ux-proposal-fs-dag"]')) return;
          const link = document.createElement('a');
          link.href = '#ux-proposal-fs-dag';
          link.textContent = 'Accepted · Tree + DAG';
          link.style.cssText = 'background:#2f2a26;border:1px solid #2f2a26;border-radius:999px;color:#fff;font-size:12px;font-weight:800;padding:7px 11px;text-decoration:none;white-space:nowrap';
          nav.appendChild(link);
        };
        addIndexLink(0);
      };
      setTimeout(function() { mountProposal(0); }, 80);
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\n  a:hover { color:#93583f; }\n  @keyframes gw-pulse { 0%,100% { opacity:.55; } 50% { opacity:.9; } }\n  @keyframes bk-turn { from { opacity:0; transform:translateX(10px) rotateY(3deg); } to { opacity:1; transform:none; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:1260px;margin:0 auto;padding:56px 40px 90px;box-sizing:border-box\">\n\n  <!-- ============ HEADER ============ -->\n  <header style=\"max-width:900px\">\n    <div style=\"margin-bottom:34px\">\n      <div style=\"font-family:'Parisienne',cursive;font-size:54px;color:#2c2a27;line-height:1\">ghost-writer<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:8px;color:#b3a99d;max-width:340px\">\n        <span style=\"flex:1;height:1px;background:linear-gradient(90deg,transparent,#cbc2b6)\"><\u002Fspan>\n        <span style=\"font-family:'Jost',sans-serif;font-size:10.5px;font-weight:500;letter-spacing:.36em;text-transform:uppercase;white-space:nowrap\">✦ &nbsp;AI Writing Studio&nbsp; ✦<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:linear-gradient(90deg,#cbc2b6,transparent)\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family:'Jost',sans-serif;color:#8a8076;font-size:11px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;margin:0 0 12px\">Interaction concepts · Version 2.0<\u002Fp>\n    <h1 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:58px;font-weight:600;line-height:1.03;margin:0 0 16px\">The Story Canvas<\u002Fh1>\n    <p style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:21px;line-height:1.5;color:#6c645b;margin:0 0 18px;max-width:820px\">Version 2.0 replaces the Plan area with a spatial canvas where stories are concepted, storyboarded, and visualized. Writers can start from words or from the board — the canvas and the manuscript stay linked, and AI helps derive one from the other without ever mutating either.<\u002Fp>\n    <div style=\"background:#f2eee7;border:1px solid #d8d0c5;border-radius:10px;padding:14px 16px;font-size:13.5px;line-height:1.7;color:#4c453e\">\n      <strong>Fidelity:<\u002Fstrong> product-direction mockups, not final visual design ·\n      <strong>Reference size:<\u002Fstrong> desktop concepts at 1440 × 960 proportions ·\n      <strong>Sample project:<\u002Fstrong> <em>The Signal at Bellwether<\u002Fem> ·\n      <strong>Supersedes:<\u002Fstrong> the Plan sections of Mockups 1.0; all other 1.0 surfaces carry forward with the revisions listed at the end.\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ INDEX ============ -->\n  <nav aria-label=\"Mockup index\" style=\"display:flex;flex-wrap:wrap;gap:8px;margin:28px 0 8px;position:sticky;top:0;background:rgba(251,250,247,.95);padding:12px 0;border-bottom:1px solid #d8d0c5;z-index:5\">\n    <a href=\"#posture\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Design posture<\u002Fa>\n    <a href=\"#spark2\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Spark 2.0<\u002Fa>\n    <a href=\"#canvas\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Canvas workspace<\u002Fa>\n    <a href=\"#derive\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Derive from draft<\u002Fa>\n    <a href=\"#handoff\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Scene handoff<\u002Fa>\n    <a href=\"#split\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Split view<\u002Fa>\n    <a href=\"#book\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Book reader<\u002Fa>\n    <a href=\"#imagery\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Imagery lifecycle<\u002Fa>\n    <a href=\"#carryover\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">1.0 carry-over<\u002Fa>\n    <a href=\"#states\" style=\"background:#fff;border:1px solid #d8d0c5;border-radius:999px;font-size:12.5px;font-weight:700;padding:6px 12px;text-decoration:none;color:#27231f\">Required states<\u002Fa>\n  <\u002Fnav>\n\n  <!-- ============ POSTURE ============ -->\n  <section id=\"posture\" style=\"margin-top:48px\">\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 14px\">Design posture 2.0<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px\">\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:16px\">\n        <h4 style=\"margin:0 0 6px;font-size:14px\">One spatial model, many views<\u002Fh4>\n        <p style=\"color:#6c645b;margin:0;font-size:13.5px;line-height:1.55\">The canvas absorbs the outline and scene board. Cards, entities, imagery, threads, and lanes are the same objects everywhere — a board column is just the canvas grouped; the outline is the canvas read in spine order.<\u002Fp>\n      <\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:16px\">\n        <h4 style=\"margin:0 0 6px;font-size:14px\">Two journeys, one destination<\u002Fh4>\n        <p style=\"color:#6c645b;margin:0;font-size:13.5px;line-height:1.55\"><strong>Storyboard-first<\u002Fstrong> concepts on the canvas and derives scene briefs down into Draft. <strong>Written-first<\u002Fstrong> lets AI read the manuscript and propose a canvas upward. Both meet in the same scene objects.<\u002Fp>\n      <\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:16px\">\n        <h4 style=\"margin:0 0 6px;font-size:14px\">Links are first-class objects<\u002Fh4>\n        <p style=\"color:#6c645b;margin:0;font-size:13.5px;line-height:1.55\">Writer-made pins and AI-detected links share one anatomy: what connects, the evidence, and a confirm/reject decision. A link is never silently created by the model.<\u002Fp>\n      <\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:16px\">\n        <h4 style=\"margin:0 0 6px;font-size:14px\">Imagery earns canon<\u002Fh4>\n        <p style=\"color:#6c645b;margin:0;font-size:13.5px;line-height:1.55\">Generated concept art arrives provisional with a full prompt receipt. It becomes canon reference art — visible in the Story bible — only when the writer confirms it.<\u002Fp>\n      <\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:16px\">\n        <h4 style=\"margin:0 0 6px;font-size:14px\">Ghost until confirmed<\u002Fh4>\n        <p style=\"color:#6c645b;margin:0;font-size:13.5px;line-height:1.55\">Everything the model derives — beats, threads, links, imagery — renders dashed and labeled until reviewed. The 1.0 proposal-review trust rules extend to the canvas unchanged.<\u002Fp>\n      <\u002Farticle>\n      <article style=\"background:#fff;border:1px solid #d8d0c5;border-radius:10px;padding:16px\">\n        <h4 style=\"margin:0 0 6px;font-size:14px\">The spine keeps order honest<\u002Fh4>\n        <p style=\"color:#6c645b;margin:0;font-size:13.5px;line-height:1.55\">A story spine strip along the canvas floor shows the linear reading order derived from the board. If canvas order and Draft order drift, the spine says so — it never reorders the manuscript itself.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SPARK 2.0 ============ -->\n  <section id=\"spark2\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <p style=\"color:#6e3f32;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">Journey 0 · Guided entry<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 10px\">Spark 2.0 — words or worlds first<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 8px;font-size:15px\">Onboarding now asks one new question: do you want to start writing, or start seeing? Choosing “Storyboard first” turns the spark into a nascent canvas — a handful of provisional concept tiles scattered in space, ready to be arranged. The original spark stays preserved either way.<\u002Fp>\n\n    <div style=\"border:1px solid #d8d0c5;border-radius:14px;margin:20px 0;overflow-x:auto;background:#fff\">\n      <div data-screen-label=\"Spark 2.0\" role=\"img\" aria-label=\"Spark 2.0 onboarding concept\" style=\"width:1180px;display:grid;grid-template-columns:36% 64%;background:#fcfaf6;color:#28231f;font-family:ui-sans-serif,system-ui,sans-serif;font-size:12px;min-height:660px\">\n        <aside style=\"background:#342d27;color:#f4eee7;display:flex;flex-direction:column;justify-content:space-between;padding:42px;box-sizing:border-box\">\n          <div style=\"display:flex;align-items:baseline;gap:6px\"><span style=\"font-family:'Parisienne',cursive;font-size:30px;line-height:.85;color:#f4eee7\">ghost-writer<\u002Fspan><\u002Fdiv>\n          <div style=\"max-width:330px\">\n            <p style=\"color:#b8aba0;font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin:0 0 10px\">Start with a spark<\u002Fp>\n            <h3 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;font-weight:500;line-height:1.18;margin:0 0 16px\">Some stories begin as sentences. Others begin as places you can almost see.<\u002Fh3>\n            <p style=\"color:#cfc3b8;font-size:14px;line-height:1.55;margin:0\">Either way, Ghostwriter keeps your original idea intact and helps you find useful possibilities. Nothing here is permanent.<\u002Fp>\n          <\u002Fdiv>\n          <p style=\"color:#b8aba0;font-size:11px;margin:0\">Private on this device · No account required<\u002Fp>\n        <\u002Faside>\n        <div style=\"padding:34px 46px;box-sizing:border-box\">\n          <div style=\"display:flex;align-items:center;gap:8px;color:#766c63;font-size:10px;margin-bottom:24px\">\n            <span style=\"width:20px;height:20px;border-radius:50%;background:#754535;color:#fff;display:flex;align-items:center;justify-content:center\">1<\u002Fspan> Spark\n            <span style=\"width:20px;height:20px;border-radius:50%;border:1px solid #ddd5ca;display:flex;align-items:center;justify-content:center\">2<\u002Fspan> Shape\n            <span style=\"width:20px;height:20px;border-radius:50%;border:1px solid #ddd5ca;display:flex;align-items:center;justify-content:center\">3<\u002Fspan> Create\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:25px;font-weight:500;margin:0 0 6px\">How do you want to begin?<\u002Fh2>\n          <p style=\"color:#766c63;margin:0 0 16px\">Both paths lead to the same project. You can switch anytime — the canvas and the draft are two views of one story.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px\">\n            <article style=\"background:#fff;border:1px solid #ddd5ca;border-radius:10px;padding:16px\">\n              <p style=\"color:#766c63;font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin:0 0 8px\">Write first<\u002Fp>\n              <strong style=\"display:block;font-size:14px;margin-bottom:5px\">Open a blank page<\u002Fstrong>\n              <p style=\"color:#766c63;line-height:1.5;margin:0 0 12px\">Start drafting immediately. Ghostwriter can derive a canvas from your pages later — nothing visual is required.<\u002Fp>\n              <button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:7px 12px;font-size:12px;color:#28231f\">Start writing<\u002Fbutton>\n            <\u002Farticle>\n            <article style=\"background:#fff;border:2px solid #2c2a27;border-radius:10px;padding:16px;box-shadow:0 6px 16px rgba(117,69,53,.12)\">\n              <p style=\"color:#754535;font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin:0 0 8px\">Storyboard first · Selected<\u002Fp>\n              <strong style=\"display:block;font-size:14px;margin-bottom:5px\">Open a story canvas<\u002Fstrong>\n              <p style=\"color:#766c63;line-height:1.5;margin:0 0 12px\">Concept in space: scenes as cards, characters as figures, imagery for mood. Draft prose when the shape feels right.<\u002Fp>\n              <button type=\"button\" style=\"background:#2c2a27;border:1px solid #2c2a27;border-radius:6px;font-weight:700;padding:7px 12px;font-size:12px;color:#fff\">Seed my canvas<\u002Fbutton>\n            <\u002Farticle>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #cfc5ba;border-radius:9px;font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;line-height:1.55;padding:14px 16px;margin-bottom:14px\">A lighthouse keeper starts receiving distress calls from tomorrow—in her own voice.<\u002Fdiv>\n          <div style=\"position:relative;background:#f5f1ea;background-image:radial-gradient(#ddd3c4 1px,transparent 1px);background-size:20px 20px;border:1px solid #ddd5ca;border-radius:10px;height:210px;overflow:hidden\">\n            <span style=\"position:absolute;top:10px;left:12px;background:#e8f0f4;color:#3f6175;font-size:9px;font-weight:700;border-radius:999px;padding:3px 8px\">Seeding your canvas · everything below is provisional<\u002Fspan>\n            <article style=\"position:absolute;left:24px;top:44px;width:170px;background:#fff;border:1px dashed #adc7d3;border-radius:8px;padding:9px;box-shadow:0 4px 10px rgba(50,44,39,.07)\">\n              <span style=\"color:#3f6175;font-size:8.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase\">Beat · suggested<\u002Fspan>\n              <strong style=\"display:block;margin:4px 0 2px;font-size:12px\">The call from tomorrow<\u002Fstrong>\n              <p style=\"color:#766c63;margin:0;line-height:1.4;font-size:10.5px\">Mara hears her future self warn that the island must go dark.<\u002Fp>\n            <\u002Farticle>\n            <div style=\"position:absolute;left:236px;top:38px;display:flex;flex-direction:column;align-items:center;gap:4px\">\n              <span style=\"width:42px;height:42px;border-radius:50%;background:#ded4ca;color:#754535;font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;display:flex;align-items:center;justify-content:center;border:2px dashed #adc7d3\">M<\u002Fspan>\n              <span style=\"font-size:9.5px;font-weight:700\">Mara Venn<\u002Fspan>\n              <span style=\"background:#e8f0f4;color:#3f6175;font-size:8px;font-weight:700;border-radius:999px;padding:2px 6px\">Suggested<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:absolute;left:340px;top:52px;width:150px;border:1px dashed #adc7d3;border-radius:8px;overflow:hidden;background:#fff\">\n              <div style=\"height:74px;background:repeating-linear-gradient(45deg,#efe8de 0 8px,#e4d9c9 8px 16px);display:flex;align-items:center;justify-content:center;font-family:ui-monospace,SFMono-Regular,monospace;font-size:9px;color:#766c63\">lighthouse mood · gen<\u002Fdiv>\n              <p style=\"margin:0;padding:6px 8px;font-size:10px;color:#766c63\">Bellwether at dusk · concept<\u002Fp>\n            <\u002Fdiv>\n            <article style=\"position:absolute;left:530px;top:70px;width:140px;background:#f5ecd9;border:1px solid #e2d2ae;border-radius:6px;padding:8px;font-family:'Cormorant Garamond',Georgia,serif;font-size:11px;line-height:1.4;transform:rotate(-1.5deg)\">Who — or what — is sending the calls? <span style=\"display:block;font-family:ui-sans-serif,system-ui,sans-serif;font-size:8.5px;color:#80622c;font-weight:700;margin-top:5px\">OPEN QUESTION · KEPT OPEN<\u002Fspan><\u002Farticle>\n            <article style=\"position:absolute;left:150px;top:140px;width:190px;background:#fff;border:1px solid #ddd5ca;border-radius:8px;padding:9px\">\n              <span style=\"color:#766c63;font-size:8.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase\">Original spark · preserved<\u002Fspan>\n              <p style=\"color:#38322d;margin:4px 0 0;line-height:1.45;font-family:'Cormorant Garamond',Georgia,serif;font-size:11.5px\">“Distress calls from tomorrow — in her own voice.”<\u002Fp>\n            <\u002Farticle>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:16px\">\n            <button type=\"button\" style=\"background:transparent;border:1px solid transparent;border-radius:6px;font-weight:700;padding:7px 10px;font-size:12px;color:#766c63\">Import pages instead<\u002Fbutton>\n            <div style=\"display:flex;gap:8px\">\n              <button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:7px 12px;font-size:12px;color:#28231f\">Rearrange the seeds<\u002Fbutton>\n              <button type=\"button\" style=\"background:#2c2a27;border:1px solid #2c2a27;border-radius:6px;font-weight:700;padding:7px 12px;font-size:12px;color:#fff\">Open the canvas<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:4px\">\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">A choice, not a fork<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">Both paths create the same project shape. The choice sets the opening surface, never the capabilities.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Seeds are ghosts<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">Every AI-seeded tile is dashed and labeled “suggested.” The original spark is the only solid object.<\u002Fp><\u002Farticle>\n        <article style=\"border-top:2px solid #d8d0c5;padding-top:10px\"><h4 style=\"margin:0 0 4px;font-size:13.5px\">Open questions are objects<\u002Fh4><p style=\"color:#6c645b;margin:0;font-size:13px;line-height:1.5\">“Who sends the calls?” lands on the canvas as a note marked kept-open — ambiguity is stored, not filled.<\u002Fp><\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ CANVAS WORKSPACE (HERO) ============ -->\n  <section id=\"canvas\" style=\"border-top:1px solid #d8d0c5;margin-top:64px;padding-top:26px\">\n    <p style=\"color:#6e3f32;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;margin:0 0 6px\">Core workspace · The hero surface<\u002Fp>\n    <h2 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-size:31px;font-weight:600;margin:0 0 10px\">Canvas workspace<\u002Fh2>\n    <p style=\"color:#6c645b;line-height:1.6;max-width:800px;margin:0 0 8px;font-size:15px\">The Canvas rail item replaces Plan. Scenes, characters, imagery, notes, and plot threads live in one zoomable space organized by act lanes. Threads render as colored connections; the story spine along the floor keeps linear order visible. Selecting anything opens its detail in the inspector — here, a provisional concept image on its way to canon.<\u002Fp>\n\n    <div style=\"border:1px solid #d8d0c5;border-radius:14px;margin:20px 0;overflow-x:auto;background:#fff\">\n      <div data-screen-label=\"Canvas workspace\" role=\"img\" aria-label=\"Canvas workspace concept\" style=\"width:1180px;background:#f5f1ea;color:#28231f;font-family:ui-sans-serif,system-ui,sans-serif;font-size:12px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;background:#fdfcf9;border-bottom:1px solid #ddd5ca;height:52px;padding:0 14px;gap:12px\">\n          <div style=\"display:flex;align-items:baseline;gap:6px\"><span style=\"font-family:'Parisienne',cursive;font-size:25px;line-height:.85;color:#2c2a27\">ghost-writer<\u002Fspan><\u002Fdiv>\n          <div style=\"color:#766c63;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">The Signal at Bellwether / <strong style=\"color:#28231f\">Canvas<\u002Fstrong><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px\">\n            <span style=\"color:#3f684f;font-size:11px;font-weight:700\">Saved locally · just now<\u002Fspan>\n            <button type=\"button\" style=\"background:#fff;border:1px solid #ddd5ca;border-radius:6px;font-weight:700;padding:7px 10px;font-size:12px;color:#28231f\">Search ⌘K<\u002Fbutton>\n            <button type=\"button\" style=\"background:#2c2a27;border:1px solid #2c2a27;border-radius:6px;font-weight:700;padding:7px 10px;font-size:12px;color:#fff\">Derive from draft<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:58px 1fr 276px;min-height:640px\">\n          <nav aria-label=\"Project areas\" style=\"background:#322c27;color:#cbbfb4;display:flex;flex-direction:column;gap x;background:#fff;border:2px dashed #3f6175;border-radius:8px;padding:9px;box-shadow:0 0 0 4px rgba(63,97,117,.12)\">\n              <span style=\"color:#3f6175;font-size:8.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase\">Thread · inferred · selected<\u002Fspan>\n              <strong style=\"display:block;margin:4px 0 2px;font-size:12px\">The missing logbook<\u002Fstrong>\n              <p style=\"color:#766c63;margin:0;line-height:1.4;font-size:10.5px\">Recurs in 4 passages across chapters 1 and 3.<\u002Fp>\n            <\u002Farticle>\n            <article style=\"position:absolute;left:90px;top:380px;width:150px;background:#f5ecd9;border:1px dashed #d9c48f;border-radius:6px;padding:8px;font-family:'Cormorant Garamond',Georgia,serif;font-size:11px;line-height:1.4\">“The light was built to warn ships, not time.” <span style=\"display:block;font-family:ui-sans-serif,system-ui,sans-serif;font-size:8.5px;color:#80622c;font-weight:700;margin-top:5px\">PULLED LINE · CH 1<\u002Fspan><\u002Farticle>\n            <article style=\"position:absolute;left:350px;top:350px;width:160px;background:#fff;border:1px dashed #adc7d3;border-radius:8px;padding:9px\">\n              <span style=\"color:#3f6175;font-size:8.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase\">Beat · inferred<\u002Fspan>\n              <strong style=\"display:block;margin:4px 0 2px;font-size:12px\">Calder knows more<\u002Fstrong>\n              <p style=\"color:#766c63;margin:0;line-height:1.4;font-size:10.5px\">Ch 3 · He recognizes the frequency without being told.<\u002Fp>\n            <\u002Farticle>\n            <div style=\"position:absolute;left:12px;right:12px;bottom:12px;background:rgba(255,253,250,.94);border:1px solid #ddd5ca;border-radius:9px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center\">\n              <span style=\"font-size:11px;color:#766c63\"><strong style=\"color:#28231f\">Review queue:<\u002Fstrong> 9 elements · confirm
