name: Lakebase PR branch

# Gives every pull request an isolated Lakebase database branch (copy-on-write from production),
# runs migrations against it, and deletes it when the PR closes. No-ops until the Databricks
# service-principal secrets and LAKEBASE_* variables are configured, so forks and unconfigured
# repos are unaffected.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: lakebase-pr-${{ github.event.number }}
  cancel-in-progress: false

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  LAKEBASE_PROJECT_ID: ${{ vars.LAKEBASE_PROJECT_ID }}
  LAKEBASE_USER: ${{ vars.LAKEBASE_USER }}
  LAKEBASE_ENDPOINT_ID: ${{ vars.LAKEBASE_ENDPOINT_ID }}

jobs:
  provision:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      HAS_SECRETS: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_CLIENT_ID != '' && secrets.DATABRICKS_CLIENT_SECRET != '' && vars.LAKEBASE_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip when unconfigured
        if: env.HAS_SECRETS != 'true'
        run: echo "Databricks/Lakebase not configured — skipping PR database branch."

      - uses: pnpm/action-setup@v4
        if: env.HAS_SECRETS == 'true'

      - uses: actions/setup-node@v4
        if: env.HAS_SECRETS == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install storage dependencies
        if: env.HAS_SECRETS == 'true'
        run: pnpm install --frozen-lockfile --filter "@ghostwriter/storage..."

      - name: Install Databricks CLI
        if: env.HAS_SECRETS == 'true'
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh

      - name: Create/reset branch and migrate
        if: env.HAS_SECRETS == 'true'
        run: |
          BRANCH="pr-${{ github.event.number }}"
          # Reset from production by recreating so each run tests migrations against fresh data.
          databricks postgres delete-branch "projects/${LAKEBASE_PROJECT_ID}/branches/${BRANCH}" 2>/dev/null || true
          ./scripts/lakebase.sh create-branch "$BRANCH" 172800
          ./scripts/lakebase.sh migrate "$BRANCH"

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      HAS_SECRETS: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_CLIENT_ID != '' && secrets.DATABRICKS_CLIENT_SECRET != '' && vars.LAKEBASE_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip when unconfigured
        if: env.HAS_SECRETS != 'true'
        run: echo "Databricks/Lakebase not configured — nothing to clean up."

      - name: Install Databricks CLI
        if: env.HAS_SECRETS == 'true'
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh

      - name: Delete PR branch
        if: env.HAS_SECRETS == 'true'
        run: ./scripts/lakebase.sh delete-branch "pr-${{ github.event.number }}" || true
